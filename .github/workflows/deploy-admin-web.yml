# 管理后台前端自动部署 - push 到 main 分支时触发
# 流程：SSH 到服务器 → git pull → npm build → 复制到 Nginx 目录
#
# 需要在 GitHub Secrets 中配置：
#   SERVER_HOST     - 服务器 IP
#   SERVER_USER     - SSH 用户名
#   SERVER_SSH_KEY  - SSH 私钥
#
# 服务器上需要提前安装 Node.js 18+

name: Deploy Admin Web

on:
  push:
    branches: [main]
    paths:
      - 'admin-web/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 5m
          script: |
            # 加载 nvm 环境
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            cd /www/maptrace/repo

            # 拉取最新代码
            git pull origin main

            # 安装依赖并打包
            cd admin-web
            npm install
            npm run build

            # 复制到 Nginx 静态目录
            rm -rf /www/wwwroot/admin.maptrace.top/*
            cp -r dist/* /www/wwwroot/admin.maptrace.top/

            echo "✅ admin-web 部署成功"
